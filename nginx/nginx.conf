# SituationRoom — Nginx reverse proxy configuration
#
# This file is used in production mode only (docker compose --profile app up).
# In dev mode, Vite's built-in proxy handles /api and /ws instead.
#
# Traffic routing:
#   /api/*   → Go API gateway (situationroom-api:8080)  — REST endpoints
#   /ws      → Go API gateway (situationroom-api:8080)  — WebSocket upgrade
#   /        → Frontend container  (situationroom-frontend:80) — static React app
#
# The frontend container is a separate nginx:alpine instance that serves the
# Vite-built dist/ directory. This nginx is the public-facing entry point.

# Use the number of CPU cores for worker processes.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file sending (zero-copy for static assets).
    sendfile on;

    # Keep-alive timeout for browser connections.
    keepalive_timeout 65;

    # Upstream: Go API gateway
    upstream api {
        server situationroom-api:8080;
    }

    # Upstream: Frontend static file server
    upstream frontend {
        server situationroom-frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # ------------------------------------------------------------------
        # REST API — proxy to Go
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Prevent nginx from buffering large API responses
            proxy_buffering off;
        }

        # ------------------------------------------------------------------
        # WebSocket — proxy to Go with upgrade headers
        # ------------------------------------------------------------------
        location /ws {
            proxy_pass         http://api;
            proxy_http_version 1.1;

            # These two headers are required for the WebSocket handshake.
            # Without them nginx downgrades the connection to HTTP/1.0
            # and the upgrade fails.
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # WebSocket connections are long-lived — increase read timeout.
            proxy_read_timeout 3600s;
        }

        # ------------------------------------------------------------------
        # Frontend static assets — proxy to the frontend container
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
